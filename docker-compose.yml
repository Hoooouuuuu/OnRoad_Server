version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    env_file:
      - .env  # 👈 민감 정보는 이 파일에서만 관리
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: my_db
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend

  spring:
    build:
      context: .
      dockerfile: Dockerfile.spring
    container_name: spring-app
    depends_on:
      mysql:
        condition: service_healthy  # ✅ DB 연결 준비될 때까지 대기
    ports:
      - "8080:8080"
    env_file:
      - .env
    networks:
      - backend

  flask:
    build: ./flask
    container_name: flask-app
    ports:
      - "5001:5001"
    env_file:
      - .env
    networks:
      - backend

volumes:
  mysql-data:

networks:
  backend: